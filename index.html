<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Académica | IPMHU</title>

    <!-- Optimización de carga de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Librería PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">
<!--el archivo js-->
    <script type="module" src="js/app.js"></script>

</head>

<body>
<!-- LOGIN -->
<section id="login-overlay" aria-label="Inicio de sesión">
    <div class="login-card">
        <img src="logo.png" alt="Logo IPMHU" class="logo-img">

        <h2 class="login-title">Sistema de Gestión Académica</h2>
        <p class="login-subtitle">Acceso Institucional</p>

        <input 
            type="text" 
            id="login-user" 
            placeholder="Usuario / Correo / ID"
            autocomplete="username"
        >

        <input 
            type="password" 
            id="login-pass" 
            placeholder="Contraseña"
            autocomplete="current-password"
        >

        <button class="btn-primary" id="btn-login">Ingresar</button>
        <p id="login-msg" class="login-msg"></p>
    </div>
</section>

<!-- APP -->
<div id="app" class="hidden wrapper">

    <!-- Overlay móvil -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <img src="logo.png" alt="Logo IPMHU" class="sidebar-logo">

        <nav id="sidebar-nav" aria-label="Menú principal">
            <!-- Menú dinámico -->
        </nav>

        <button class="nav-btn logout-btn" id="logout-btn">
            Cerrar sesión
        </button>
    </aside>

    <!-- Contenido principal -->
    <main class="main-content">

        <header class="top-bar">
            <div class="top-left">
                <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">☰</button>
                <h2 class="app-title">
                    SGA | <span id="role-display"></span>
                </h2>
            </div>

            <div id="user-display" class="user-pill">
                Usuario
            </div>
        </header>

        <section class="scroll-area">
            <div id="content-area">
                <!-- Contenido dinámico -->
            </div>
        </section>

    </main>
</div>

 

</body>
</html>
